[package]
name = "pratt"
version = "0.1.0"
edition = "2021"

[lib]
name = "pratt"
crate-type = ["cdylib"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
panic = "abort"

[dependencies]
dlmalloc = { version = "0.2", features = ["global"] }
ryu = "1.0"
