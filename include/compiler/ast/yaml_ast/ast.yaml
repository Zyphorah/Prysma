Node:
  Core:
    Instruction:
      engine: []
      champs:
        children: "llvm::ArrayRef<INode*>"
  Function:
    CallFunction:
      engine: [parser, expression]
      champs:
        nomFunction: "Token"
        children: "llvm::ArrayRef<INode*>"
    ArgFunction:
      engine: [parser]
      champs:
        type: "IType*"
        nom: "Token"
    DeclarationFunction:
      engine: [parser]
      champs:
        visibilite: "Token"
        typeReturn: "IType*"
        nom: "Token"
        arguments: "llvm::ArrayRef<INode*>"
        body: "INode*"
    Return:
      engine: [parser]
      champs:
        valeurReturn: "INode*"

  Variable:
    AssignmentVariable:
      engine: [parser]
      champs:
        nom: "Token"
        expression: "INode*"
        token: "Token"
    DeclarationVariable:
      engine: [parser]
      champs:
        visibilite: "Token"
        nom: "Token"
        type: "IType*"
        expression: "INode*"  
    RefVariable:
      engine: [parser, expression]
      champs:
        nomVariable: "Token"
    UnRefVariable:
      engine: [parser, expression]
      champs:
        nomVariable: "Token"
    Identifiant:
      engine: [expression]
      champs: {}

  Array:
    AssignmentArray:
      engine: []
      champs:
        nom: "Token"
        expressionIndex: "INode*"
        expression: "INode*"
        token: "Token"
    ArrayInitialization:
      engine: [expression]
      champs:
        elements: "llvm::ArrayRef<INode*>"
    ReadingArray:
      engine: []
      champs:
        indexEquation: "INode*"
        nomArray: "Token"

  Object:
    Class:
      engine: [parser]
      champs: 
        heritage: "llvm::ArrayRef<INode*>"
        listMembers: "llvm::ArrayRef<INode*>"
        builder: "llvm::ArrayRef<INode*>"
        nomClass: "Token"
    CallObject:
      engine: [parser, expression]
      champs:
        nomObject: "Token"
        nomMethode: "Token"
        children: "llvm::ArrayRef<INode*>"
    AccesAttribute:
      engine: []
      champs:
        nomObject: "Token"
        nomAttribute: "Token"
    DeclarationObject:
      engine: []
      champs:
        nomObject: "Token"
        typeObject: "IType*"
        
  Condition:
    If:
      engine: [parser]
      champs:
        nodeCondition: "INode*"
        nodeBlocIf: "INode*"
        nodeBlocElse: "INode*"
        nodeBlocEndif: "INode*"
  ControlMemory:
    New:
      engine: [expression]
      champs:
        arguments: "llvm::ArrayRef<INode*>"
        nomType: "Token"
    Delete:
      engine: [parser]
      champs:
        nomType: "Token"
        
  IncludeModule:
    Include:
      engine: [parser]
      champs:
        path: "Token"

  Loops:
    While:
      engine: [parser]
      champs:
        nodeCondition: "INode*"
        nodeBlocWhile: "INode*"
        nodeBlocFinWhile: "INode*"
    
  Math:
    Operation:
      engine: []
      parent: "IExpression"
      champs:
        token: "Token"
        gauche: "INode*"
        droite: "INode*"
    Literal:
      engine: [expression]
      champs:
        token: "Token"

    Negation:
      engine: [expression]
      champs:
        operateur: "Token"
        operande: "INode*"
    String:
      engine: [expression]
      champs: {}
