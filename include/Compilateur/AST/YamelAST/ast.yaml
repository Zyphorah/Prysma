Noeud:
  Fonction:
    AppelFonction:
      parent: "NoeudInstruction"
      champs:
        nomFonction: "Token"
    ArgFonction:
      champs:
        type: "IType*"
        nom: "std::string"
    DeclarationFonction:
      champs:
        typeRetour: "IType*"
        nom: "std::string"
        arguments: "std::vector<INoeud*>"
        corps: "INoeud*"
    Retour:
      champs:
        valeurRetour: "INoeud*"

  Variable:
    AffectationVariable:
      champs:
        nom: "std::string"
        expression: "INoeud*"
        token: "Token"
    DeclarationVariable:
      champs:
        nom: "std::string"
        type: "IType*"
        expression: "INoeud*"  
    RefVariable:
      champs:
        nomVariable: "std::string"
    UnRefVariable:
      champs:
        nomVariable: "std::string"
    Include:
      champs:
        path: "std::string"

  Tableau:
    AffectationTableau:
      champs:
        nom: "std::string"
        expressionIndex: "INoeud*"
        expression: "INoeud*"
        token: "Token"
    TableauInitialisation:
      champs:
        elements: "std::vector<INoeud*>"
    LectureTableau:
      champs:
        indexEquation: "INoeud*"
        nomTableau: "Token"

  Instruction:
    If:
      parent: "NoeudInstruction"
      champs:
        noeudCondition: "INoeud*"
        noeudBlocIf: "INoeud*"
        noeudBlocElse: "INoeud*"
        noeudBlocEndif: "INoeud*"

    While:
      parent: "NoeudInstruction"
      champs:
        noeudCondition: "INoeud*"
        noeudBlocWhile: "INoeud*"
        noeudBlocFinWhile: "INoeud*"
    New:
      champs:
        nomType: "Token"
    Delete:
      champs:
        nomType: "Token"
        
  Math:
    Operation:
      parent: "IExpression"
      champs:
        token: "Token"
        gauche: "INoeud*"
        droite: "INoeud*"

    Litteral:
      champs:
        token: "Token"

    Negation:
      champs:
        operateur: "Token"
        operande: "INoeud*"
