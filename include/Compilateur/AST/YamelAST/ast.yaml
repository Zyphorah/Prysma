Noeud:
  Fonction:
    AppelFonction:
      moteur: [parseur, expression]
      parent: "NoeudInstruction"
      champs:
        nomFonction: "Token"
    ArgFonction:
      moteur: [parseur]
      champs:
        type: "IType*"
        nom: "std::string"
    DeclarationFonction:
      moteur: [parseur]
      champs:
        typeRetour: "IType*"
        nom: "std::string"
        arguments: "std::vector<INoeud*>"
        corps: "INoeud*"
    Retour:
      moteur: [parseur]
      champs:
        valeurRetour: "INoeud*"

  Variable:
    AffectationVariable:
      moteur: [parseur]
      champs:
        nom: "std::string"
        expression: "INoeud*"
        token: "Token"
    DeclarationVariable:
      moteur: [parseur]
      champs:
        nom: "std::string"
        type: "IType*"
        expression: "INoeud*"  
    RefVariable:
      moteur: [parseur, expression]
      champs:
        nomVariable: "std::string"
    UnRefVariable:
      moteur: [parseur, expression]
      champs:
        nomVariable: "std::string"
    Identifiant:
      moteur: [expression]
      champs: {}

  Tableau:
    AffectationTableau:
      moteur: []
      champs:
        nom: "std::string"
        expressionIndex: "INoeud*"
        expression: "INoeud*"
        token: "Token"
    TableauInitialisation:
      moteur: [expression]
      champs:
        elements: "std::vector<INoeud*>"
    LectureTableau:
      moteur: []
      champs:
        indexEquation: "INoeud*"
        nomTableau: "Token"

  objet:
    Class:
      moteur: [parseur, expression]
      champs: 
        Heritage: "std::vector<INoeud*>"
        listVariable: "std::vector<INoeud*>"
        listFonction: "std::vector<INoeud*>"
        listVariablePrive: "std::vector<INoeud*>"
        listFonctionPrive: "std::vector<INoeud*>"
        listVariableProtected: "std::vector<INoeud*>"
        listFonctionProtected: "std::vector<INoeud*>"
        constructeur: "std::vector<INoeud*>"
        nomClass: "Token"

  Instruction:
    If:
      moteur: [parseur]
      parent: "NoeudInstruction"
      champs:
        noeudCondition: "INoeud*"
        noeudBlocIf: "INoeud*"
        noeudBlocElse: "INoeud*"
        noeudBlocEndif: "INoeud*"

    While:
      moteur: [parseur]
      parent: "NoeudInstruction"
      champs:
        noeudCondition: "INoeud*"
        noeudBlocWhile: "INoeud*"
        noeudBlocFinWhile: "INoeud*"
    New:
      moteur: [expression]
      champs:
        nomType: "Token"
    Delete:
      moteur: [parseur]
      champs:
        nomType: "Token"
    Include:
      moteur: [parseur]
      champs:
        path: "std::string"
    
        
  Math:
    Operation:
      moteur: []
      parent: "IExpression"
      champs:
        token: "Token"
        gauche: "INoeud*"
        droite: "INoeud*"

    Litteral:
      moteur: [expression]
      champs:
        token: "Token"

    Negation:
      moteur: [expression]
      champs:
        operateur: "Token"
        operande: "INoeud*"
    String:
      moteur: [expression]
      champs: {}
    